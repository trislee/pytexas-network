# Push to main/master runs this workflow; the published site is ONLY the Vite `build/`
# output uploaded as a Pages artifact—not the files at the root of main.
#
# Settings → Pages → Source must be “GitHub Actions”. If you use “Deploy from a branch”
# → main → /, GitHub serves source index.html (404 on /src/index.tsx). No extra branch needed.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Ensure pytexas.json for the app
        run: |
          if [ ! -f public/pytexas.json ]; then
            cp public/dataset.json public/pytexas.json
          fi
      # GITHUB_REPOSITORY is set by Actions; vite.config.mts uses it for `base` (e.g. /repo-name/).
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
